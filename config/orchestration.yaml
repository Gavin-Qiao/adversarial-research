# Principia Orchestration Configuration
# Modify this file to change the algorithm design workflow.
# Changes take effect immediately — no restart needed.

# The debate loop: architect proposes, adversary attacks
debate_loop:
  sequence: [architect, adversary]
  max_rounds: 3                      # hard cap on debate rounds
  final_say: adversary               # who gets the last word before experimenter

# Role definitions
roles:
  - name: architect
    type: debate
    max_rounds: 3
    output_dir: "round-{round}"
    files: [prompt.md, result.md]

  - name: adversary
    type: debate
    max_rounds: 3
    output_dir: "round-{round}"
    files: [prompt.md, result.md]
    exit_condition:
      field: "Severity"
      continue_on: [fatal, serious]   # continue debate loop
      exit_on: [minor, none]          # proceed to experimenter
      unknown: continue               # default when field not found

  - name: experimenter
    type: empirical
    max_rounds: 1
    output_dir: "results"
    files: [output.md]

  - name: arbiter
    type: verdict
    max_rounds: 1
    output_dir: "results"
    files: [verdict.md]
    verdict_field: "Verdict"
    verdict_values: [PROVEN, DISPROVEN, PARTIAL, INCONCLUSIVE]

# Phase definitions
phases:
  debate:
    roles: [architect, adversary]
    description: "Iterative hypothesis refinement through adversarial debate"
  experiment:
    roles: [experimenter]
    description: "Empirical testing of the refined hypothesis"
  verdict:
    roles: [arbiter]
    description: "Evaluate all evidence and render verdict"

# Post-verdict actions
post_verdict:
  PROVEN:
    action: complete
    message: "Claim proven. Run /principia:status to see progress."
  DISPROVEN:
    action: complete
    cascade: true
    message: "Hypothesis disproven. Dependents weakened."
  PARTIAL:
    action: prompt_user
    message: "Verdict partial — claim holds under some conditions."
    options:
      - "Narrow the claim (add conditions)"
      - "Gather more experimental evidence"
      - "Accept partial result and move on"
  INCONCLUSIVE:
    action: prompt_user
    message: "Verdict inconclusive — insufficient evidence either way."
    options:
      - "Try a different approach"
      - "Gather more evidence"
      - "Defer and move to next claim"

# Severity keywords for parsing adversary output
severity_keywords:
  fatal: ["fatal", "blocks the approach", "fundamentally flawed"]
  serious: ["serious", "requires modification", "significant concern"]
  minor: ["minor", "worth noting", "cosmetic"]
  none: ["no genuine flaws", "no fatal", "clean"]

# Post-verdict automation
# When true, post-verdict bookkeeping is done programmatically.
# Set to false for human-in-the-loop review.
auto_review: true

# v0.3: Understand phase sub-steps
understand:
  substeps: [discuss, inspect, research]
  discuss:
    adaptive_pushback: true
    max_questions: 5
  inspect:
    scan_codebase: true
    scan_prior_sessions: true
    scan_git_history: true
  research:
    iterative: true
    max_scout_dispatches: 3

# v0.3: Quick mode overrides
quick_mode:
  understand:
    skip_research: true
    max_discuss_questions: 2
  divide:
    skip_synthesizer: true
  test:
    max_rounds: 1
  synthesize:
    skip_composition: true

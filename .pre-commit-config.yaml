default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ci-ruff-check
        name: ci ruff check
        entry: uv run ruff check scripts/ tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ci-ruff-format-check
        name: ci ruff format check
        entry: uv run ruff format --check scripts/ tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ci-pytest
        name: ci pytest
        entry: uv run --python 3.12 python -m pytest tests/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: ci-mypy
        name: ci mypy
        entry: uv run --python 3.12 python -m mypy scripts/
        language: system
        pass_filenames: false
        stages: [pre-push]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
